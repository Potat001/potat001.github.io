<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
</head>
<body>
    <header>
<!--Home page-->
        <div class="navBars">
            <a href="index.html">
                <button class="navs">Homepage</button>
            </a>
<!--Calculator-->
            <a href="calculator.html">
                <button class="navs">Calculator</button>
            </a>
<!--About me-->
            <a href="aboutMe.html">
                <button class="navs">About Me</button>
            </a>
<!--Language: Norwegian nynorsk-->
            <button class="languageSwitch">Norsk</button>
<!--Language: English-->
            <button class="languageSwitch">English</button>
<!--Favorite pictures-->
            <a href="favoritePictures.html">
                <button class="navs">My favorite pictures</button>
            </a>
        </div>
    </header>
    <main>
        <div id="calculator">
<!--To write directly into the calculator (maybe later)-->
        <!--<input id="display" type="text" oninput="validateMathInput(this)" placeholder="Numbers here...">-->
<!--The area we write into-->
            <input id="display" type="text" oninput="writableDisplayValidator(this)" placeholder="Numbers here...">
            <div id="buttonRows">
                <button onclick="trigonimetricFunctions('sin')">sin</button>
                <button onclick="trigonimetricFunctions('cos')">cos</button>
                <button onclick="trigonimetricFunctions('tan')">tan</button>
                <button onclick="removePrevious()">⌫</button>
                <button onclick="bracketOne()">(</button>
                <button onclick="bracketTwo()">)</button>
                <button onclick="clearDisplay()">Clear</button>
                <button onclick="appendToDisplay('/')">÷</button>
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('*')">*</button>
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('+')">+</button>
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="appendToDisplay('-')">-</button>
                <button onclick="root()">√◼</button>
                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button onclick="calculate()">=</button>
            </div>
        </div>
    </main>
    <footer>
    </footer>
<script src="index.js"></script>
</body>
</html>
